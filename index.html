<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSV Americas Lean Training Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#eef2f7;color:#1f2937;display:flex;min-height:100vh;}
/* Sidebar */
#sidebar{width:220px;min-width:220px;background:#002664;min-height:100vh;display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,0.15);flex-shrink:0;}
#sidebar .logo-area{padding:16px;border-bottom:1px solid rgba(255,255,255,0.1);}
#sidebar .logo-area img{height:34px;object-fit:contain;display:block;}
#sidebar .logo-area .sub{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.2px;margin-top:6px;font-weight:600;}
#sidebar .sample-banner{margin:10px 12px;background:rgba(251,191,36,0.15);border-radius:6px;padding:6px 10px;font-size:10px;color:#fbbf24;line-height:1.4;display:none;}
#sidebar nav{flex:1;padding:10px 0;}
#sidebar nav button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 16px;border:none;cursor:pointer;text-align:left;background:transparent;border-left:3px solid transparent;color:rgba(255,255,255,0.55);font-size:13px;font-weight:400;transition:all 0.15s;font-family:inherit;}
#sidebar nav button:hover{color:#fff;background:rgba(255,255,255,0.06);}
#sidebar nav button.active{background:rgba(255,255,255,0.12);border-left:3px solid #D97706;color:#fff;font-weight:600;}
#sidebar nav button .icon{font-size:15px;}
#sidebar .divider{margin:8px 12px 4px;border-top:1px solid rgba(255,255,255,0.08);padding-top:8px;font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
#sidebar .save-status{padding:8px 16px;font-weight:500;}
/* Main */
#main{flex:1;overflow-y:auto;background:#eef2f7;padding:20px 24px;}
.view{max-width:none;margin:0;}
/* Page title */
.page-title{font-size:22px;font-weight:700;color:#002664;margin-bottom:4px;}
.page-sub{font-size:12px;color:#6b7280;margin-bottom:20px;}
/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;}
.filter-bar span{font-size:11px;color:#6b7280;font-weight:500;}
.filter-bar select{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:#374151;background:#fff;font-family:inherit;}
.filter-bar button{padding:5px 10px;background:#fff;border:1px solid #d1d5db;border-radius:6px;font-size:11px;cursor:pointer;color:#374151;font-family:inherit;}
.filter-bar button:hover{background:#f3f4f6;}
/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px;}
.kpi-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e5e7eb;border-top:4px solid #002664;}
.kpi-card .kpi-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.kpi-card .kpi-label{font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;line-height:1.4;}
.kpi-card .kpi-icon{font-size:18px;}
.kpi-card .kpi-value{font-size:28px;font-weight:700;line-height:1;}
.kpi-card .kpi-sub{font-size:11px;color:#9ca3af;margin-top:4px;}
/* Panels */
.panel{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e5e7eb;margin-bottom:20px;}
.panel-title{font-size:14px;font-weight:700;color:#002664;margin-bottom:14px;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.panel-header .panel-title{margin-bottom:0;}
.panel-header a,.panel-header button.link-btn{font-size:12px;color:#002664;background:transparent;border:1px solid #d1d5db;border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:500;font-family:inherit;text-decoration:none;}
/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:9px 12px;text-align:left;font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid #e5e7eb;background:#f9fafb;}
.tbl th.center,.tbl td.center{text-align:center;}
.tbl td{padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#002664;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#fafafa;}
/* Progress bar */
.pbar-wrap{display:flex;align-items:center;gap:8px;}
.pbar{flex:1;background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden;}
.pbar .fill{height:100%;border-radius:4px;transition:width 0.5s;}
.pbar-label{font-size:12px;font-weight:700;width:36px;text-align:right;}
/* Mini stat grids */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:#f3f4f6;border-radius:8px;padding:12px 14px;}
.stat-box .s-label{font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.stat-box .s-value{font-size:22px;font-weight:700;}
/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
/* Badges */
.badge{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
/* Donut */
#donut-legend{margin-top:0;}
.donut-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.donut-row .dr-left{display:flex;align-items:center;gap:8px;font-size:12px;color:#374151;}
.donut-row .dr-right{display:flex;align-items:center;gap:8px;}
.donut-row .dr-count{font-size:14px;font-weight:700;}
.donut-row .dr-pct{font-size:11px;color:#9ca3af;width:36px;text-align:right;}
/* Upload zone */
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#fafafa;transition:all 0.2s;}
.upload-zone:hover{border-color:#002664;background:#eef2f7;}
.upload-zone .uz-icon{font-size:28px;margin-bottom:8px;}
.upload-zone .uz-title{font-size:14px;color:#002664;font-weight:600;margin-bottom:4px;}
.upload-zone .uz-sub{font-size:12px;color:#6b7280;}
/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
.form-group{margin-bottom:12px;}
.form-group label{font-size:11px;color:#6b7280;font-weight:600;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px;}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;font-family:inherit;color:#1f2937;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#002664;}
.btn-primary{padding:9px 20px;background:#002664;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-primary:hover{background:#002664;}
/* Alerts */
.alert-success{font-size:12px;color:#065f46;background:#d1fae5;border-radius:6px;padding:6px 12px;margin-bottom:10px;}
.alert-error{font-size:12px;color:#991b1b;background:#fee2e2;border-radius:6px;padding:6px 12px;margin-bottom:10px;}
.alert-info{font-size:12px;color:#1e40af;background:#dbeafe;border-radius:6px;padding:6px 12px;margin-bottom:10px;}
/* Section header */
.section-hdr{font-size:11px;font-weight:700;color:#002664;text-transform:uppercase;letter-spacing:0.8px;margin:20px 0 10px;}
/* Tier tabs */
.tier-tabs{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:20px;}
.tier-tabs button{padding:9px 22px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;font-family:inherit;}
.tier-tabs button.active{color:TIER_COLOR[t];font-weight:700;}
/* Exam chart */
.score-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.score-bar-row .score-label{width:24px;font-size:12px;color:#6b7280;text-align:right;}
.score-bar-row .score-bar{flex:1;background:#f3f4f6;border-radius:4px;height:20px;overflow:hidden;}
.score-bar-row .score-bar .fill{height:100%;display:flex;align-items:center;padding-left:6px;border-radius:4px;}
.score-bar-row .score-bar .fill span{font-size:11px;color:#fff;font-weight:600;}
.score-bar-row .pass-label{font-size:10px;width:30px;}
/* Radio group */
.radio-group label{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;font-size:13px;color:#374151;}
.radio-group input[type=radio]{accent-color:#002664;}
/* Ticker */
#save-ticker{padding:8px 16px;font-size:11px;font-weight:500;min-height:28px;}
/* Search bar */
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:7px 12px;margin-bottom:14px;}
.search-bar input{border:none;outline:none;font-size:13px;font-family:Arial,sans-serif;flex:1;color:#002664;}
.search-bar input::placeholder{color:#9ca3af;}
.search-bar .s-icon{color:#9ca3af;font-size:14px;flex-shrink:0;}
.search-bar .s-count{font-size:11px;color:#9ca3af;white-space:nowrap;}
/* Date range filter */
.date-range{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #d1d5db;border-radius:8px;padding:7px 12px;margin-bottom:14px;flex-wrap:wrap;}
.date-range label{font-size:11px;color:#6b7280;font-weight:600;}
.date-range input[type=date]{border:1px solid #d1d5db;border-radius:6px;padding:4px 8px;font-size:12px;font-family:Arial,sans-serif;color:#002664;}
.date-range .dr-clear{font-size:11px;color:#9ca3af;cursor:pointer;background:none;border:none;font-family:Arial,sans-serif;}
.date-range .dr-clear:hover{color:#374151;}
/* Upload feedback */
.upload-feedback{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:12px;}
.upload-feedback .uf-title{font-weight:700;color:#00682A;margin-bottom:6px;font-size:13px;}
.upload-feedback .uf-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #dcfce7;color:#374151;}
.upload-feedback .uf-row:last-child{border-bottom:none;}
.upload-feedback .uf-warn{background:#fef9f0;border:1px solid #fed7aa;border-radius:6px;padding:8px 12px;margin-top:8px;color:#92400e;font-size:11px;}
/* Export button */
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#002664;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;}
.export-btn:hover{background:#1e40af;}
/* Learner profile modal */
#profile-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;}
#profile-modal.open{display:flex;}
#profile-box{background:#fff;border-radius:14px;width:680px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,0.18);margin-bottom:40px;}
#profile-box .pb-header{background:#002664;border-radius:14px 14px 0 0;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;}
#profile-box .pb-header h2{color:#fff;font-size:16px;font-weight:700;margin:0;}
#profile-box .pb-close{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:22px;cursor:pointer;line-height:1;}
#profile-box .pb-body{padding:20px 22px;}
.pb-section{margin-bottom:18px;}
.pb-section-title{font-size:10px;font-weight:700;color:#002664;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;}
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pb-field{background:#f9fafb;border-radius:7px;padding:8px 12px;}
.pb-field .pf-label{font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;}
.pb-field .pf-value{font-size:13px;color:#002664;font-weight:500;}
.tier-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f9fafb;border-radius:7px;margin-bottom:6px;}
.tier-row .tr-tier{font-size:12px;font-weight:700;width:70px;}
.tier-row .tr-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;}
.tier-row .tr-score{font-size:12px;color:#6b7280;margin-left:auto;}
/* Velocity chart */
.vel-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.vel-bar-row .vb-label{font-size:11px;color:#002664;width:55px;text-align:right;flex-shrink:0;}
.vel-bar-row .vb-bar{flex:1;background:#e5e7eb;border-radius:4px;height:16px;overflow:hidden;}
.vel-bar-row .vb-bar .fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;transition:width 0.5s;}
.vel-bar-row .vb-bar .fill span{font-size:10px;color:#fff;font-weight:600;}
.vel-bar-row .vb-count{font-size:11px;color:#6b7280;width:28px;text-align:right;}
/* Inactive sites */
.inactive-site{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;}
.inactive-site:last-child{border-bottom:none;}
/* Passcode modal *//* Passcode modal */
#passcode-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;align-items:center;justify-content:center;}
#passcode-modal.open{display:flex;}
#passcode-box{background:#fff;border-radius:14px;padding:32px 28px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.18);text-align:center;}
#passcode-box .pc-icon{font-size:32px;margin-bottom:12px;}
#passcode-box .pc-title{font-size:16px;font-weight:700;color:#002664;margin-bottom:4px;}
#passcode-box .pc-sub{font-size:12px;color:#6b7280;margin-bottom:20px;}
#passcode-box input{width:100%;padding:10px 14px;border:2px solid #d1d5db;border-radius:8px;font-size:18px;text-align:center;letter-spacing:6px;font-family:inherit;outline:none;transition:border-color 0.2s;}
#passcode-box input:focus{border-color:#002664;}
#passcode-box input.error{border-color:#b91c1c;animation:shake 0.3s;}
#passcode-box .pc-error{font-size:12px;color:#b91c1c;margin-top:8px;min-height:18px;}
#passcode-box .pc-btn{margin-top:16px;width:100%;padding:10px;background:#002664;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
#passcode-box .pc-btn:hover{background:#002664;}
#passcode-box .pc-cancel{margin-top:10px;font-size:12px;color:#9ca3af;cursor:pointer;background:none;border:none;font-family:inherit;}
#passcode-box .pc-cancel:hover{color:#374151;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────
const norm = s => (s||"").toString().trim();
// Strip trailing * and other decoration characters from column headers
const normCol = s => norm(s).replace(/[*#!?:]+$/, "").trim();
const normLow = s => normCol(s).toLowerCase();
function fmtSavings(n){if(n>=1e6)return"$"+(n/1e6).toFixed(n%1e6===0?0:1)+"M";if(n>=1e3)return"$"+(n/1e3).toFixed(n%1e3===0?0:1)+"K";return"$"+Math.round(n).toLocaleString();}
function pct(a,b){return b?Math.round((a/b)*100):0;}
const isApproved = p => {const v=norm(p.approved).toLowerCase();return v==="yes"||v==="true"||v==="1";};
// Returns true if learner should count in ops KPIs
// Non-ops: type field contains "non-ops", "non ops", "management", "support", "admin", "salary" etc
function isManualCertified(email, tier){
  const d2=data||SAMPLE;
  return !!(d2.certOverrides&&d2.certOverrides[email+"||"+tier]);
}

function isOps(learnerType){
  if(!learnerType)return true; // no type = ops by default
  const v=learnerType.toLowerCase().trim();
  if(v===""||v==="ops"||v==="operations"||v==="hourly"||v==="blue collar"||v==="production")return true;
  return false; // anything else (non-ops, management, support, admin, etc.) = excluded
}
// ── Date helpers ─────────────────────────────────────────────────
function daysBetween(d1,d2){
  if(!d1||!d2)return null;
  const a=new Date(d1),b=new Date(d2);
  if(isNaN(a)||isNaN(b))return null;
  return Math.round((b-a)/(1000*60*60*24));
}
function fmtDays(n){
  if(n===null||n===undefined)return"—";
  if(n<0)return"—";
  if(n<7)return n+"d";
  if(n<30)return Math.round(n/7)+"w";
  return Math.round(n/30)+"mo";
}
function getMonthKey(dateStr){
  if(!dateStr)return null;
  return dateStr.slice(0,7); // YYYY-MM
}
function fmtMonth(key){
  if(!key)return"";
  const[y,m]=key.split("-");
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[parseInt(m)-1]+" "+y;
}

function extractCustomer(site, explicitCustomer){
  // If an explicit customer was provided, use it
  if(explicitCustomer&&explicitCustomer.trim())return explicitCustomer.trim();
  if(!site)return"";
  const s=site.toLowerCase();
  // Check lookup table first
  for(const[key,val] of Object.entries(CUSTOMER_MAP)){
    if(s.startsWith(key)||s.includes(" "+key)||s.includes("-"+key))return val;
  }
  // Fallback: take prefix before first " - " or first space
  if(site.includes(" - "))return site.split(" - ")[0].trim();
  const firstWord=site.split(" ")[0].trim();
  return firstWord||site;
}

function displayEmail(email){
  if(!email||email.endsWith("@internal"))return"<span style=\'color:#9ca3af;font-size:11px;font-style:italic\'>Auto ID</span>";
  if(!email.includes("@"))return`<span style="font-size:13px;color:#002664;font-weight:500">${email}</span>`;
  return email;
}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});
  if(children){if(typeof children==="string")e.innerHTML=children;else if(Array.isArray(children))children.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});}
  return e;
}
function html(str){const d=document.createElement("div");d.innerHTML=str;return d;}

// ── Find column ───────────────────────────────────────────────────
function findCol(keys,...terms){
  // Exact match (after stripping * etc from header)
  for(const t of terms){const m=keys.find(k=>normLow(k)===normLow(t));if(m)return m;}
  // Partial match
  for(const t of terms){const m=keys.find(k=>normLow(k).includes(normLow(t)));if(m)return m;}
  // Also try matching term against key with asterisks stripped
  for(const t of terms){const m=keys.find(k=>normCol(k).toLowerCase().includes(normLow(t)));if(m)return m;}
  return null;
}

// ── Persistence ───────────────────────────────────────────────────
function snapshotData(){
  // Save a timestamped backup to Firestore before destructive operations
  if(!data||!usingLive)return;
  const ts=new Date().toISOString().slice(0,19).replace('T','_').replace(/:/g,'-');
  const snap={...data,snapshotAt:new Date().toISOString()};
  // Keep last 10 snapshots
  db.collection("lean_snapshots").doc(ts).set(snap)
    .then(()=>{
      // Trim old snapshots — keep only 10 most recent
      db.collection("lean_snapshots").orderBy("snapshotAt","asc").get()
        .then(qs=>{
          if(qs.size>10){
            const toDelete=qs.docs.slice(0,qs.size-10);
            toDelete.forEach(d=>d.ref.delete());
          }
        });
      console.info("Snapshot saved:",ts);
    })
    .catch(err=>console.error("Snapshot failed:",err));
}

// ── Weekly auto-backup ────────────────────────────────────────────
function checkWeeklyBackup(){
  const lastBackup=localStorage.getItem("dsv_last_backup");
  const now=new Date();
  const weekAgo=new Date(now-7*24*60*60*1000);
  if(!lastBackup||new Date(lastBackup)<weekAgo){
    if(data&&usingLive){
      const ts=new Date().toISOString().slice(0,10);
      db.collection("lean_snapshots").doc("weekly_"+ts).set({
        ...data,snapshotAt:new Date().toISOString(),type:"weekly"
      }).then(()=>{
        localStorage.setItem("dsv_last_backup",now.toISOString());
        showSave("✓ Weekly backup saved","#86efac");
      });
    }
  }
}

function saveData(d){
  // Save to localStorage as immediate fallback
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}
  // Save to Firestore (split into chunks to stay under 1MB doc limit)
  if(firebaseSaving)return;
  firebaseSaving=true;
  const payload={
    workshops:d.workshops||[],
    attendees:d.attendees||[],
    exams:d.exams||[],
    allExamRows:d.allExamRows||[],
    projects:d.projects||[],
    trainers:(d.trainers||[]).map(t=>{
      // Strip cert data from main doc — store separately in Storage
      const {certs,...rest}=t;
      return rest;
    }),
    certNums:d.certNums||{},
    _internalIdCounter:d._internalIdCounter||1000,
    firstPassRate:d.firstPassRate||0,
    avgScore:d.avgScore||0,
    updatedAt:new Date().toISOString(),
  };
  db.collection("lean_data").doc("main").set(payload)
    .then(()=>{firebaseSaving=false;showSave("✓ Saved to cloud","#86efac");})
    .catch(err=>{firebaseSaving=false;console.error("Firestore save error:",err);showSave("⚠ Cloud save failed","#fca5a5");});
  // Save certs to Firestore separately (they can be large)
  if(d.certs&&Object.keys(d.certs).length){
    db.collection("lean_data").doc("certs").set(d.certs)
      .catch(err=>console.error("Cert save error:",err));
  }
}
function loadData(){
  // ── Step 1: Render immediately with best available local data ────
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){data=JSON.parse(r);usingLive=true;}
  }catch(e){}

  if(!usingLive){
    data=SAMPLE;
    document.getElementById("sample-banner").style.display="block";
  }
  render(); // Show dashboard instantly — no waiting

  // ── Step 2: Sync from Firestore in background ─────────────────
  showSave("⟳ Syncing…","#93c5fd");
  db.collection("lean_data").doc("main").get()
    .then(doc=>{
      if(doc.exists){
        const d=doc.data();
        db.collection("lean_data").doc("certs").get()
          .then(certsDoc=>{
            data={...d,certs:certsDoc.exists?certsDoc.data():{}};
            usingLive=true;
            try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
            document.getElementById("sample-banner").style.display="none";
            showSave("✓ Synced","#86efac");
            checkWeeklyBackup();
            render(); // Re-render with fresh cloud data
          })
          .catch(()=>{
            data=d;usingLive=true;
            document.getElementById("sample-banner").style.display="none";
            showSave("✓ Synced","#86efac");
            render();
          });
      } else {
        // No cloud data yet — stay with whatever we loaded locally
        showSave("","");
      }
    })
    .catch(err=>{
      console.error("Firestore load error:",err);
      showSave("⚠ Offline — showing cached data","#fca5a5");
    });
}

// ── Filter helpers ────────────────────────────────────────────────
function getFilteredData(){
  const f=globalFilters, d2=data||SAMPLE;
  const wf=d2.workshops.filter(w=>
    (f.region==="All"||w.region===f.region)&&
    (f.country==="All"||w.country===f.country)&&
    (f.customer==="All"||w.customer===f.customer)&&
    (f.tier==="All"||w.tier===f.tier)&&
    (f.trainer==="All"||w.leadTrainer===f.trainer||w.coTrainer===f.trainer)&&
    (!dateFrom||!w.date||w.date>=dateFrom)&&
    (!dateTo||!w.date||w.date<=dateTo)
  );
  const wids=new Set(wf.map(w=>w.id));
  const af=d2.attendees.filter(a=>
    wids.has(a.workshopId)&&
    (f.site==="All"||a.site===f.site)&&
    (f.customer==="All"||a.customer===f.customer)&&
    (f.country==="All"||a.country===f.country)&&
    (f.region==="All"||a.region===f.region)
  );
  const emails=new Set(af.map(a=>a.email));
  const opsEmails=new Set(af.filter(a=>isOps(a.learnerType)).map(a=>a.email));
  return{
    workshops:wf,attendees:af,emails,opsEmails,
    exams:d2.exams.filter(x=>(f.tier==="All"||x.tier===f.tier)&&emails.has(x.email)),
    projects:d2.projects.filter(p=>(f.tier==="All"||p.tier===f.tier)&&emails.has(p.email)),
    trainers:d2.trainers.filter(t=>(f.region==="All"||t.region===f.region)&&(f.country==="All"||t.country===f.country)&&(f.customer==="All"||t.customer===f.customer)),
    allExamRows:(d2.allExamRows||[]).filter(x=>(f.tier==="All"||x.tier===f.tier)&&emails.has(x.email)),
    firstPassRate:d2.firstPassRate||0,avgScore:d2.avgScore||0,
  };
}

function uniq(arr){return[...new Set(arr.filter(Boolean))].sort();}
function getFilterOptions(d2){
  return{
    regions:uniq([...d2.workshops.map(w=>w.region),...d2.attendees.map(a=>a.region)]),
    countries:uniq([...d2.workshops.map(w=>w.country),...d2.attendees.map(a=>a.country)]),
    sites:uniq(d2.attendees.map(a=>a.site)),
    customers:uniq([...d2.workshops.map(w=>w.customer),...d2.attendees.map(a=>a.customer)]),
    trainers:uniq([...d2.workshops.map(w=>w.leadTrainer),...d2.workshops.map(w=>w.coTrainer)]),
  };
}

// ── Build filter bar ──────────────────────────────────────────────
function buildDateRange(){
  const wrap=document.createElement("div");
  wrap.className="date-range";
  wrap.innerHTML=`
    <label>From:</label>
    <input type="date" id="dr-from" value="${dateFrom}">
    <label>To:</label>
    <input type="date" id="dr-to" value="${dateTo}">
    ${(dateFrom||dateTo)?'<button class="dr-clear" id="dr-clear">✕ Clear dates</button>':''}
  `;
  setTimeout(()=>{
    const f=document.getElementById("dr-from");
    const t=document.getElementById("dr-to");
    const cl=document.getElementById("dr-clear");
    if(f)f.onchange=e=>{dateFrom=e.target.value;render();};
    if(t)t.onchange=e=>{dateTo=e.target.value;render();};
    if(cl)cl.onclick=()=>{dateFrom="";dateTo="";render();};
  },0);
  return wrap;
}

  const wrap=document.createElement("div");
  wrap.className="search-bar";
  const input=document.createElement("input");

// ── Donut chart ───────────────────────────────────────────────────
function buildDonut(counts){
  const total=counts.reduce((s,c)=>s+c.value,0)||1;
  const size=160, r=55, cx=80, cy=80, sw=24;
  const circ=2*Math.PI*r;
  let offset=0;
  const segs=counts.filter(c=>c.value>0).map(c=>{
    const dash=(c.value/total)*circ;
    const s={...c,dash,offset};
    offset+=dash;
    return s;
  });

  const svgParts=[`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`];
  svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="${sw}"/>`);
  segs.forEach(s=>{
    svgParts.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${s.dash} ${circ-s.dash}" stroke-dashoffset="${-s.offset}" transform="rotate(-90 ${cx} ${cy})"/>`);
  });
  svgParts.push(`<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="11" fill="#9ca3af" font-family="Arial,sans-serif">Total</text>`);
  svgParts.push(`<text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="20" font-weight="700" fill="${NAVY}" font-family="Arial,sans-serif">${total}</text>`);
  svgParts.push(`</svg>`);

  const legend=counts.map(c=>`
    <div class="donut-row">
      <div class="dr-left"><span class="dot" style="background:${c.color}"></span>${c.label}</div>
      <div class="dr-right"><span class="dr-count" style="color:${c.color}">${c.value}</span><span class="dr-pct">${pct(c.value,total)}%</span></div>
    </div>`).join('');

  const wrap=document.createElement("div");
  wrap.style.cssText="display:flex;align-items:center;gap:20px;";
  wrap.innerHTML=svgParts.join('')+`<div style="flex:1">${legend}</div>`;
  return wrap;
}

// ── Learner status calc ───────────────────────────────────────────
function getLearnerStatus(fd, tier){
  const d2=data||SAMPLE;
  const allExamRows=d2.allExamRows||[];
  let learners=[];
  if(tier==="All"){
    const emailStatus={};
    TIERS.forEach(t=>{
      const ws=fd.workshops.filter(w=>w.tier===t);
      const wsIds=new Set(ws.map(w=>w.id));
      const att=fd.attendees.filter(a=>wsIds.has(a.workshopId));
      att.forEach(a=>{
        const bestExam=fd.exams.find(x=>x.email===a.email&&x.tier===t);
        const approved=bestExam?.passed&&fd.projects.find(p=>p.email===a.email&&p.tier===t&&isApproved(p));
        const hasFailed=allExamRows.some(r=>r.email===a.email&&r.tier===t&&!r.passed);
        let st;
        if(approved) st="Certified";
        else if(bestExam?.passed) st="Trained";
        else if(hasFailed) st="Attended Not Passed";
        else st="No Exam Yet";
        const rank={"No Exam Yet":0,"Attended Not Passed":1,"Trained":2,"Certified":3};
        if(!emailStatus[a.email]||rank[st]>rank[emailStatus[a.email]])emailStatus[a.email]=st;
      });
    });
    learners=Object.values(emailStatus).map(s=>({status:s}));
  } else {
    const ws=fd.workshops.filter(w=>w.tier===tier);
    const wsIds=new Set(ws.map(w=>w.id));
    const att=fd.attendees.filter(a=>wsIds.has(a.workshopId));
    const seen=new Set();
    att.forEach(a=>{
      if(seen.has(a.email))return; seen.add(a.email);
      const bestExam=fd.exams.find(x=>x.email===a.email&&x.tier===tier);
      const approved=bestExam?.passed&&fd.projects.find(p=>p.email===a.email&&p.tier===tier&&isApproved(p));
      const hasFailed=allExamRows.some(r=>r.email===a.email&&r.tier===tier&&!r.passed);
      let st;
      if(approved) st="Certified";
      else if(bestExam?.passed) st="Trained";
      else if(hasFailed) st="Attended Not Passed";
      else st="No Exam Yet";
      learners.push({status:st});
    });
  }
  const total=learners.length||1;
  return ["No Exam Yet","Attended Not Passed","Trained","Certified"].map(s=>({
    label:s,value:learners.filter(l=>l.status===s).length,color:STATUS_COLOR[s],
  }));
}

// ── Parse Excel ───────────────────────────────────────────────────
let wsCounter=1000;
function genId(){return"W"+(++wsCounter);}

function parseExcelFile(wb){
  function sheet(name){
    const sn=wb.SheetNames.find(n=>normLow(n).includes(normLow(name)));
    if(!sn){console.warn("Sheet not found for:",name,"Available:",wb.SheetNames);return[];}
    const ws=wb.Sheets[sn];
    // Try reading normally first
    let rows=XLSX.utils.sheet_to_json(ws,{defval:""});
    // If first row looks like a title (has no recognisable column keys — all __EMPTY or tab name)
    if(rows.length){
      const firstKeys=Object.keys(rows[0]);
      // Detect title row: first key contains the sheet name, is a long title string,
      // or all remaining keys are __EMPTY
      const firstKeyLow=normLow(firstKeys[0]||"");
      const looksLikeTitle=
        firstKeys.slice(1).every(k=>k==="__EMPTY"||k.startsWith("__EMPTY_")) && (
          firstKeyLow===normLow(name) ||
          firstKeyLow===normLow(sn) ||
          firstKeys[0].includes("—") ||
          firstKeys[0].includes("DSV") ||
          firstKeys[0].length>30
        );
      if(looksLikeTitle){
        rows=XLSX.utils.sheet_to_json(ws,{defval:"",range:1});
      }
    }
    // Strip any legend/note rows at the bottom (rows where all values are blank or contain "required" text)
    rows=rows.filter(r=>{
      const vals=Object.values(r).map(v=>(v||"").toString().trim()).filter(Boolean);
      if(!vals.length)return false;
      const joined=vals.join(" ").toLowerCase();
      if(joined.includes("required for dashboard")||joined.includes("highlighted = optional")||joined.includes("delete the"))return false;
      return true;
    });
    return rows;
  }
  const wsRaw=sheet("workshop"), attRaw=sheet("attend"), examRaw=sheet("exam"), projRaw=sheet("project"), trRaw=sheet("trainer");

  const workshops=wsRaw.map(r=>{const k=Object.keys(r);const _ws=norm(r[findCol(k,"site")||""]||""),_wc=norm(r[findCol(k,"customer","client","account")||""]||"");
    const _dateRaw=r[findCol(k,"date","workshop date","training date")||""];
    return{id:norm(r[findCol(k,"workshop id","id","ws id")||""]),tier:norm(r[findCol(k,"tier")||""]),date:xlSerialToDate(_dateRaw),region:norm(r[findCol(k,"region")||""]),country:norm(r[findCol(k,"country")||""]),site:_ws,customer:extractCustomer(_ws,_wc),leadTrainer:norm(r[findCol(k,"lead trainer","lead")||""]),coTrainer:norm(r[findCol(k,"co-trainer","co trainer","cotrainer")||""])};}).filter(w=>w.tier||w.date);
  const attendees=attRaw.map(r=>{const k=Object.keys(r);const _wsId=norm(r[findCol(k,"workshop id","workshop")||""]||"");const _em=normLow(r[findCol(k,"email","email / id","email/id","badge","employee id","id")||""]||"");const _nm=norm(r[findCol(k,"name","full name")||""]||"");const _st=norm(r[findCol(k,"site","location")||""]||"");const _cu=norm(r[findCol(k,"customer","client","account")||""]||"");const _co=norm(r[findCol(k,"country")||""]||"");const _re=norm(r[findCol(k,"region")||""]||"");return{workshopId:_wsId,email:_em,name:_nm,site:_st,customer:extractCustomer(_st,_cu),country:_co,region:_re,learnerType:norm(r[findCol(k,"learner type","type")||""]||""),role:norm(r[findCol(k,"role","job title","position")||""]||""),department:norm(r[findCol(k,"department","dept")||""]||"")};}).map(a=>{
    if((!a.email||!a.email.includes("@"))&&a.name){
      const namePart=a.name.toLowerCase().replace(/\s+/g,".").replace(/[^a-z0-9.]/g,"");
      const sitePart=(a.site||"internal").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
      if(!data)data={...SAMPLE};
      const ctr=((data&&data._internalIdCounter)||1000)+1;
      if(data)data._internalIdCounter=ctr;
      a.email=`${namePart}.${sitePart}.${ctr}@internal`;
    }
    return a;
  }).filter(a=>a.name);

  // Parse exams - best score per email+tier
  // Helper: convert Excel serial date to YYYY-MM-DD string
  function xlSerialToDate(val){
    if(!val)return"";
    const s=val.toString().trim();
    // Already a date string?
    if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
    if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(s)){
      const d=new Date(s);
      if(!isNaN(d))return d.toISOString().slice(0,10);
    }
    // Excel serial number (days since 1899-12-30)
    const n=parseFloat(s);
    if(!isNaN(n)&&n>10000&&n<100000){
      const d=new Date(Math.round((n-25569)*86400*1000));
      return d.toISOString().slice(0,10);
    }
    return s;
  }

  const firstMap={},bestMap={};
  const allRows=examRaw.map(r=>{
    const k=Object.keys(r);

    // Email: prefer Email1 when Email column = "anonymous" (MS Forms pattern)
    let email=normLow(r[findCol(k,"email")||""]||"");
    if(!email||email==="anonymous"){
      // Try Email1, Email2, or any col with @ in value
      const altEmailCol=k.find(col=>{
        const lc=col.toLowerCase().trim();
        if(lc==="email1"||lc==="email 1"||lc==="learner email")return true;
        return false;
      });
      if(altEmailCol)email=normLow(r[altEmailCol]||"");
      // Last resort: scan all values for an email
      if(!email||email==="anonymous"){
        for(const col of k){
          const v=(r[col]||"").toString().trim();
          if(v.includes("@")&&v.includes(".")&&!v.includes(" ")){email=v.toLowerCase();break;}
        }
      }
    }

    // Name: prefer Name1 (MS Forms puts real name there)
    let learnerName=norm(r[findCol(k,"name")||""]||"");
    const name1Col=k.find(col=>col.toLowerCase().trim()==="name1"||col.toLowerCase().trim()==="name 1");
    if(name1Col)learnerName=norm(r[name1Col]||"")||learnerName;

    const tier=norm(r[findCol(k,"tier")||""]||"");
    const score=parseFloat((r[findCol(k,"score","total points","total score")||""]||"").toString().replace(/[,$]/g,""))||0;

    // Date: handle Excel serial numbers and MS Forms date formats
    const rawDate=r[findCol(k,"date","exam date","completion time","completion date","start time")||""]||"";
    const date=xlSerialToDate(rawDate);

    // Site from MS Forms "Site Name" column
    const site=norm(r[findCol(k,"site name","site","location")||""]||"");
    const customer=extractCustomer(site,"");
    const country=norm(r[findCol(k,"country")||""]||"");
    const trainer=norm(r[findCol(k,"trainer","lead trainer")||""]||"");

    // Questions: handle both Q1/Q2 pattern AND "Points - Question text" pattern (MS Forms)
    // For MS Forms: columns starting with "Points - " are 1=correct, 0=incorrect
    const questions={};
    let qNum=1;
    const qTextMap={}; // Q1 -> "actual question text"
    k.forEach(col=>{
      const trimmed=col.trim();
      // Standard Q1, Q2... pattern (from template with Q1, Q2 headers)
      if(/^q\d+$/i.test(normCol(trimmed))||/^question\s*\d+/i.test(normCol(trimmed))){
        questions[normCol(trimmed).toUpperCase()]=norm(r[col]);
      }
      // MS Forms "Points - [question text]" pattern: 1=correct, 0=incorrect
      else if(/^points\s*-\s*/i.test(trimmed)){
        const qLabel=trimmed.replace(/^points\s*-\s*/i,"").trim();
        const skip=["name","name1","email","email1","country","site name","date","trainer","training mode","total"];
        if(!skip.some(s=>qLabel.toLowerCase()===s)&&qLabel.length>2){
          const qKey="Q"+qNum;
          questions[qKey]=r[col]; // store raw 1/0
          qTextMap[qKey]=qLabel;  // store full question text
          qNum++;
        }
      }
    });

    const key=email+"|"+tier;
    if(!firstMap[key]||date<firstMap[key].date)firstMap[key]={score,date,passed:score>=16};
    if(!bestMap[key]||score>bestMap[key].score)bestMap[key]={email,tier,score,passed:score>=16,date,questions,learnerName,site,country,trainer};
    return{email,tier,score,date,passed:score>=16,questions,qTextMap,learnerName,site,country,trainer};
  });
  const exams=Object.values(bestMap);
  const fa=Object.values(firstMap);
  const firstPassRate=fa.length?Math.round((fa.filter(x=>x.passed).length/fa.length)*100):0;
  const avgScore=exams.length?+(exams.reduce((s,x)=>s+x.score,0)/exams.length).toFixed(1):0;

  // Build question label map from all rows — {tier: {Q1: "text",...}}
  const questionLabels={};
  allRows.forEach(row=>{
    if(!row.qTextMap||!Object.keys(row.qTextMap).length)return;
    const t=row.tier||"All";
    if(!questionLabels[t])questionLabels[t]={};
    Object.entries(row.qTextMap).forEach(([k,v])=>{
      if(v&&!questionLabels[t][k])questionLabels[t][k]=v;
    });
  });


  const projects=projRaw.map(r=>{const k=Object.keys(r);return{email:normLow(r[findCol(k,"email")||""]),tier:norm(r[findCol(k,"tier")||""]),submitted:xlSerialToDate(r[findCol(k,"date submitted","submitted","date submitted *")||""]),approved:norm(r[findCol(k,"approved")||""]),savings:parseFloat((r[findCol(k,"savings ($)","savings","cost savings")||""]||"").toString().replace(/[$,()]/g,""))||0};}).filter(p=>p.email);
  const trainers=trRaw.map(r=>{const k=Object.keys(r);const yn=key=>{const v=norm(r[findCol(k,key)||""]).toLowerCase();return v==="yes"||v==="true";};return{name:norm(r[findCol(k,"name","trainer name","full name")||""]),email:normLow(r[findCol(k,"email","email / id","email/id")||""]||""),site:norm(r[findCol(k,"site","location")||""]||""),region:norm(r[findCol(k,"region")||""]),country:norm(r[findCol(k,"country")||""]),customer:norm(r[findCol(k,"customer")||""]),q1a:yn("qualified 1a"),q1b:yn("qualified 1b"),q1c:yn("qualified 1c"),date1a:xlSerialToDate(r[findCol(k,"date certified 1a","date 1a")||""]),date1b:xlSerialToDate(r[findCol(k,"date certified 1b","date 1b")||""]),date1c:xlSerialToDate(r[findCol(k,"date certified 1c","date 1c")||""]),lead1a:norm(r[findCol(k,"lead trainer 1a","lead 1a")||""]||""),lead1b:norm(r[findCol(k,"lead trainer 1b","lead 1b")||""]||""),lead1c:norm(r[findCol(k,"lead trainer 1c","lead 1c")||""]||"")};}).filter(t=>t.name);

  return{workshops,attendees,exams,allExamRows:allRows,firstPassRate,avgScore,projects,trainers,questionLabels};
}

function viewLearners(){
  const fd=getFilteredData();
  const d2=data||SAMPLE;
  const byEmail={};
  fd.attendees.forEach(a=>{if(!byEmail[a.email])byEmail[a.email]={...a,wCount:0};byEmail[a.email].wCount++;});

  const wsMap={};
  (d2.workshops||[]).forEach(w=>{wsMap[w.id]=w;});

  const learners=Object.values(byEmail).map(l=>{
    const exams=fd.exams.filter(x=>x.email===l.email);
    const passed=exams.filter(x=>x.passed);
    const approved=fd.projects.filter(p=>p.email===l.email&&isApproved(p)&&fd.exams.find(x=>x.email===l.email&&x.tier===p.tier&&x.passed));
    const manualCertTiers=TIERS.filter(t=>isManualCertified(l.email,t));
    const attendedWsIds=[...new Set(fd.attendees.filter(a=>a.email===l.email).map(a=>a.workshopId))];
    const trainerSet=new Set();
    attendedWsIds.forEach(wid=>{const ws=wsMap[wid];if(ws&&ws.leadTrainer)trainerSet.add(ws.leadTrainer);});
    // Projects: submitted (any) and approved (with passed exam)
    const allProjects=fd.projects.filter(p=>p.email===l.email);
    const projectsByTier=TIERS.reduce((m,t)=>{
      const proj=allProjects.filter(p=>p.tier===t);
      m[t]={submitted:proj.length>0,approved:proj.some(p=>isApproved(p))};
      return m;
    },{});
    return{
      ...l,
      trainers:[...trainerSet].sort(),
      tiersTrained:[...new Set(passed.map(x=>x.tier))],
      tiersApproved:[...new Set([...approved.map(p=>p.tier),...manualCertTiers])],
      bestScores:exams.reduce((m,x)=>{m[x.tier]=x.score;return m;},{}),

  d.querySelector("div").appendChild(exportBtn);
  d.appendChild(buildFilterBar());
  const {wrap:lSearch}=buildSearchBar("Search by name, email, site, customer, trainer…", learnerSearch, v=>{learnerSearch=v;render();});
  d.appendChild(lSearch);
  const panel=document.createElement("div");panel.className="panel";
  panel.innerHTML=`<div style="overflow-x:auto"><table class="tbl" style="width:100%"><thead><tr>
    <th>Name</th><th>Email / ID</th><th>Site</th><th>Customer</th><th>Region</th><th>Country</th>
    <th class="center">Workshops</th><th>Trainer(s)</th><th>Trained</th><th>Exam Score</th><th class="center">Project</th><th>Certified</th>
  </tr></thead><tbody>${
    learners.map((l,i)=>`<tr style="background:${i%2?"#f9fafb":"#fff"}">
      <td style="font-weight:600;white-space:nowrap;cursor:pointer;color:#002664;text-decoration:underline;text-underline-offset:2px" onclick="showLearnerProfile('${l.email}')">${l.name}${!isOps(l.learnerType)?'<span style="margin-left:6px;background:#f3f4f6;color:#6b7280;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;vertical-align:middle">Non-Ops</span>':''}</td>
      <td style="font-size:13px;color:#6b7280">${displayEmail(l.email)}</td>
      <td style="font-size:12px">${l.site||"—"}</td>

      <td style="font-size:12px">${l.country||"—"}</td>
      <td class="center">${l.wCount}</td>
      <td style="white-space:nowrap">${

          : "<span style='color:#9ca3af;font-size:11px'>—</span>"

      <td>${l.tiersTrained.map(t=>`<span class="badge" style="background:${TIER_BG[t]};color:${TIER_COLOR[t]};margin-right:3px">${t}</span>`).join("")||"<span style='color:#9ca3af;font-size:11px'>—</span>"}</td>

window.showLearnerProfile = function(email){
  const d2 = data||SAMPLE;
  const atts = d2.attendees.filter(a=>a.email===email);
  if(!atts.length)return;
  const att = atts[0];

  // Gather all data for this learner
  const wsIds = new Set(atts.map(a=>a.workshopId));
  const workshops = d2.workshops.filter(w=>wsIds.has(w.id));
  const exams = d2.exams.filter(x=>x.email===email);
  const allAttempts = (d2.allExamRows||[]).filter(r=>r.email===email);
  const projects = d2.projects.filter(p=>p.email===email);
  const trainers = [...new Set(workshops.map(w=>w.leadTrainer).filter(Boolean))];
  const trainedEmailTiers = new Set(exams.filter(x=>x.passed).map(x=>x.email+"||"+x.tier));

  // Per-tier status
  const tierData = TIERS.map(tier=>{
    const ws = workshops.filter(w=>w.tier===tier);
    const exam = exams.find(x=>x.tier===tier);
    const attempts = allAttempts.filter(r=>r.tier===tier).sort((a,b)=>a.date.localeCompare(b.date));
    const proj = projects.filter(p=>p.tier===tier);
    const approvedProj = proj.find(p=>isApproved(p)&&exam?.passed);
    const hasFailed = attempts.some(r=>!r.passed);
    let status;
    if(approvedProj) status="Certified";
    else if(exam?.passed) status="Trained";
    else if(hasFailed) status="Attended Not Passed";
    else if(ws.length) status="No Exam Yet";
    else status=null;

    // Time calculations
    const firstWsDate = ws.length ? ws.map(w=>w.date).sort()[0] : null;
    const passDate = attempts.find(r=>r.passed)?.date||null;
    const projApprovedDate = approvedProj?.submitted||null;
    const daysToTrain = daysBetween(firstWsDate, passDate);
    const daysToCert = daysBetween(passDate, projApprovedDate);

    return{tier,ws,exam,attempts,proj,approvedProj,status,
      firstWsDate,passDate,projApprovedDate,daysToTrain,daysToCert,
      score:exam?.score??null,totalAttempts:attempts.length};
  }).filter(t=>t.status);

  // Render profile
  const name = att.name||(email.endsWith("@internal")?"(No name)":email);
  document.getElementById("pb-title").textContent = name;

  const body = document.getElementById("pb-body");
  const sc = STATUS_COLOR, sb = STATUS_BG;

  body.innerHTML = `
    <div class="pb-section">
      <div class="pb-section-title">Learner Info</div>
      <div class="pb-grid">
        <div class="pb-field"><div class="pf-label">Email / ID</div><div class="pf-value">${displayEmail(email)}</div></div>
        <div class="pb-field"><div class="pf-label">Site</div><div class="pf-value">${att.site||"—"}</div></div>
        <div class="pb-field"><div class="pf-label">Customer</div><div class="pf-value">${att.customer||"—"}</div></div>
        <div class="pb-field"><div class="pf-label">Region</div><div class="pf-value">${att.region||"—"}</div></div>
        <div class="pb-field"><div class="pf-label">Country</div><div class="pf-value">${att.country||"—"}</div></div>
        <div class="pb-field"><div class="pf-label">Trainer(s)</div><div class="pf-value">${trainers.join(", ")||"—"}</div></div>
      </div>
    </div>

    ${tierData.length?`<div class="pb-section">
      <div class="pb-section-title">Training Progress by Tier</div>
      ${tierData.map(t=>{
        const c=TIER_COLOR[t.tier]||NAVY;
        const b=TIER_BG[t.tier]||"#f3f4f6";
        const sc2=STATUS_COLOR[t.status]||"#9ca3af";
        const sb2=STATUS_BG[t.status]||"#f3f4f6";
        const manualCert=isManualCertified(email,t.tier);
        const overrideBtn=`<button onclick="toggleCertOverride('${email}','${t.tier}')"
          style="margin-left:auto;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;border:1px solid ${manualCert?"#b91c1c":"#00682A"};background:${manualCert?"#fee2e2":"#dcfce7"};color:${manualCert?"#b91c1c":"#00682A"}">
          ${manualCert?"✕ Remove Override":"★ Mark Certified"}</button>`;
        return`<div class="tier-row">
          <span class="tr-tier" style="color:${c}">${t.tier}</span>
          <span class="tr-badge" style="background:${sb2};color:${sc2}">${t.status}</span>
          ${t.score!==null?`<span style="font-size:12px;color:#6b7280">Score: <strong style="color:${t.score>=16?"#00682A":"#b91c1c"}">${t.score}/20</strong>${t.totalAttempts>1?` (${t.totalAttempts} attempts)`:""}</span>`:""}
          <span class="tr-score">
            ${t.firstWsDate?`Workshop: ${t.firstWsDate}`:""}
            ${t.daysToTrain!==null?` · Trained in ${fmtDays(t.daysToTrain)}`:""}
            ${t.daysToCert!==null?` · Cert in ${fmtDays(t.daysToCert)}`:""}
          </span>
          ${overrideBtn}
        </div>`;
      }).join("")}
    </div>`:""}

    ${projects.length?`<div class="pb-section">
      <div class="pb-section-title">Projects</div>
      ${projects.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f9fafb;border-radius:7px;margin-bottom:6px;font-size:13px">
        <span style="font-weight:600;color:${TIER_COLOR[p.tier]||NAVY}">${p.tier}</span>
        <span>Submitted: ${p.submitted||"—"}</span>
        <span style="font-weight:600;color:${isApproved(p)?"#00682A":"#f59e0b"}">${isApproved(p)?"✓ Approved":"⏳ Pending"}</span>
        <span style="color:#00682A;font-weight:600">${p.savings>0?fmtSavings(p.savings):""}</span>
      </div>`).join("")}
    </div>`:""}

    ${allAttempts.length>1?`<div class="pb-section">
      <div class="pb-section-title">Exam Attempts</div>
      ${allAttempts.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>`<div style="display:flex;gap:16px;align-items:center;padding:7px 12px;background:#f9fafb;border-radius:7px;margin-bottom:5px;font-size:12px">
        <span style="color:#6b7280;width:90px">${a.date}</span>
        <span style="font-weight:700;color:${TIER_COLOR[a.tier]||NAVY}">${a.tier}</span>
        <span style="font-weight:700;color:${a.passed?"#00682A":"#b91c1c"}">${a.score}/20</span>
        <span style="color:${a.passed?"#00682A":"#b91c1c"}">${a.passed?"Passed":"Failed"}</span>
      </div>`).join("")}
    </div>`:""}
  `;

  const modal = document.getElementById("profile-modal");
  modal.classList.add("open");
  modal.onclick = e=>{if(e.target===modal)modal.classList.remove("open");};

// ── Manual certification override ────────────────────────────────
window.toggleCertOverride = function(email, tier){
  if(!data)data={...SAMPLE};
  if(!data.certOverrides)data.certOverrides={};
  const key=email+"||"+tier;
  if(data.certOverrides[key]){
    delete data.certOverrides[key];
    showSave("Override removed","#fca5a5");
  } else {
    data.certOverrides[key]=true;

  }

};

// Global cert viewer (called from inline onclick)
window.viewCert=function(certKey){
  const d2=data||SAMPLE;
  const cert=d2.certs&&d2.certs[certKey];
  if(!cert)return;
  const modal=document.getElementById("cert-modal");
  const body=document.getElementById("cert-modal-body");
  const title=document.getElementById("cert-modal-title");
  // Parse key: cert_FirstName_LastName_Lean_1A
  const parts=certKey.replace(/^cert_/,"").split("_");
  // tier is last two parts (Lean_1A etc), name is the rest
  const tier=parts.slice(-2).join(" ");
  const name=parts.slice(0,-2).join(" ");
  title.textContent=name+" — "+tier+" Certificate";
  if(cert.type==="application/pdf"){
    body.innerHTML=`<iframe src="${cert.data}" style="width:100%;height:68vh;border:none;border-radius:6px"></iframe>`;
  } else {
    body.innerHTML=`<img src="${cert.data}" style="max-width:100%;max-height:68vh;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.12)">`;
  }
  modal.style.display="flex";
  modal.onclick=e=>{if(e.target===modal)modal.style.display="none";};
};

    const hasFailed=allER.some(r=>r.email===a.email&&r.tier===tier&&!r.passed);

      rows.forEach(r=>{
        if(!r.email||!r.email.trim()){
          const namePart=r.name.toLowerCase().replace(/\s+/g,".").replace(/[^a-z0-9.]/g,"");
          const sitePart=(site||"internal").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
          r.email=`${namePart}.${sitePart}.${++internalIdCounter}@internal`;
          r._autoId=true;
        }
      });
      if(!data)data={...SAMPLE};
      data._internalIdCounter=internalIdCounter;

      // Resolve trainer
      const trainerSel=document.getElementById("al-trainer").value;
      const leadTrainer=trainerSel==="__other__"
        ?(document.getElementById("al-trainer-other").value.trim())
        :trainerSel;

      const site=document.getElementById("al-site").value.trim();
      const customer=document.getElementById("al-customer").value.trim();
      const region=document.getElementById("al-region").value.trim();
      const country=document.getElementById("al-country").value.trim();

      if(!data)data={...SAMPLE};

      // Create a workshop record for this session
      const wsId=genId();
      data.workshops=[...data.workshops,{
        id:wsId,tier,date,site,customer:extractCustomer(site,customer),region,country,
        leadTrainer,coTrainer:"",
      }];

      // Add attendees linked to that workshop
      const newAttendees=rows.map(r=>({
        workshopId:wsId,
        email:r.email,
        name:r.name,
        site,customer,region,country,
      }));
      data.attendees=[...data.attendees,...newAttendees];

      usingLive=true;
      saveData(data);
      showSave("✓ Saved","#86efac");

      msg.innerHTML=`<div class="alert-success">✓ ${rows.length} learner${rows.length!==1?"s":""} added to a new ${tier} session on ${date}.</div>`;

      // Reset session fields but keep tier/date/site/trainer for easy repeat entry
      rowsEl.innerHTML="";
      rowCount=0;
      addRow();addRow();addRow();
      updateCount();
    };
  },0);

  return d;
}

                const site=norm(r[findCol(k,"site","location")||""]||"");
                const customer=norm(r[findCol(k,"customer","client","account")||""]||"");

                let finalEmail=email;

                  if(!name){skipped.push({row:rowNum+2,reason:"Missing both Email/ID and Name"});return;}
                  missingEmail.push(displayRow);
                  const namePart=name.toLowerCase().replace(/\s+/g,".").replace(/[^a-z0-9.]/g,"");
                  const sitePart=(site||"internal").toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
                  const ctr=((data._internalIdCounter)||1000)+1;
                  data._internalIdCounter=ctr;
                  finalEmail=`${namePart}.${sitePart}.${ctr}@internal`;
                }

                // Missing name — warn but keep
                if(!name) missingName.push(finalEmail);

                // Handle missing Workshop ID
                let finalWsId=wsId;

                  missingWorkshopId.push(displayRow);
                  // Auto-create a workshop record for this site/tier/date combo
                  const wsKey=(tier||"Unknown")+"|"+(site||"unknown")+"|"+(dateVal||"unknown");
                  if(!autoWsMap[wsKey]){
                    const newWsId=genId();
                    autoWsMap[wsKey]=newWsId;
                    if(!data.workshops)data.workshops=[];
                    data.workshops.push({
                      id:newWsId,
                      tier:tier||"",
                      date:dateVal||"",
                      site:site||"",
                      customer:extractCustomer(site||"",customer||""),
                      region:region||"",
                      country:country||"",
                      leadTrainer:"",
                      coTrainer:"",
                      _autoCreated:true,
                    });
                    autoWsCreated.push({id:newWsId,tier:tier||"(no tier)",site:site||"(no site)",date:dateVal||"(no date)"});
                  }
                  finalWsId=autoWsMap[wsKey];
                }

                valid.push({
                  workshopId:finalWsId,
                  email:finalEmail,
                  name:name||finalEmail,
                  site,customer:extractCustomer(site,customer),region,country,
                  learnerType,role,department:dept,
                });
              });

                tab:"attendees",

              data.trainers=uploadMode==="replace"?rows:dedup([...data.trainers,...rows],"name");

function viewAnalytics(){
  const fd=getFilteredData();
  const d2=data||SAMPLE;
  const exams=fd.exams;
  const allRows=fd.allExamRows||[];

  if(!exams.length){
    const d=document.createElement("div");
    d.innerHTML=`<div class="page-title" style="margin-bottom:16px">Exam Analytics</div><div class="panel" style="text-align:center;padding:40px;color:#9ca3af">No exam data available. Upload your Exam Results tab first.</div>`;
    return d;
  }

  const passed=exams.filter(x=>x.passed).length, total=exams.length;
  const avgSc=total?(exams.reduce((s,x)=>s+x.score,0)/total).toFixed(1):0;
  const firstMap={};allRows.forEach(r=>{const k=r.email+"|"+r.tier;if(!firstMap[k]||r.date<firstMap[k].date)firstMap[k]=r;});
  const fa=Object.values(firstMap);
  const fpr=fa.length?pct(fa.filter(x=>x.passed).length,fa.length):0;
  const attemptCount={};allRows.forEach(r=>{const k=r.email+"|"+r.tier;attemptCount[k]=(attemptCount[k]||0)+1;});
  const retakers=new Set(Object.entries(attemptCount).filter(([,c])=>c>1).map(([k])=>k.split("|")[0]));
  const retakerImproved=Object.entries(attemptCount).filter(([,c])=>c>1).filter(([k])=>{const rows=allRows.filter(r=>r.email===k.split("|")[0]&&r.tier===k.split("|")[1]).sort((a,b)=>a.date.localeCompare(b.date));return rows.length>1&&rows[rows.length-1].score>rows[0].score;}).length;

  const scores=exams.map(x=>x.score);
  const buckets=[];for(let s=10;s<=20;s++)buckets.push({score:s,count:scores.filter(sc=>Math.floor(sc)===s).length,pass:s>=16});
  const maxB=Math.max(...buckets.map(b=>b.count),1);

  const emailToAtt={};fd.attendees.forEach(a=>{if(!emailToAtt[a.email])emailToAtt[a.email]=a;});
  const regionMap={};exams.forEach(x=>{const att=emailToAtt[x.email];const r=(att?.region)||"Unknown";if(!regionMap[r])regionMap[r]={r,t:0,p:0};regionMap[r].t++;if(x.passed)regionMap[r].p++;});
  const regionRows=Object.values(regionMap).sort((a,b)=>b.t-a.t);

  const allQCols=new Set();allRows.forEach(r=>Object.keys(r.questions||{}).forEach(c=>allQCols.add(c)));
  const qStats=[...allQCols].sort().map(col=>{
    const rows=allRows.filter(r=>r.questions&&r.questions[col]!==undefined);
    const wrong=rows.filter(r=>{
      const v=r.questions[col];
      if(v===0||v===false)return true; // numeric 0 or boolean false
      const vs=(v||"").toString().trim().toLowerCase();
      return vs==="0"||vs==="false"||vs==="incorrect"||vs==="wrong"||vs==="no";
    }).length;
    return{col,t:rows.length,wrong,pw:rows.length?pct(wrong,rows.length):0};
  }).filter(q=>q.t>0).sort((a,b)=>b.pw-a.pw);

  const d=document.createElement("div");
  d.innerHTML=`<div class="page-title" style="margin-bottom:16px">Exam Analytics</div>`;

  const kpis=document.createElement("div");kpis.className="kpi-grid";kpis.style.marginBottom="20px";
  kpis.innerHTML=`
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Exam Records</div><div class="kpi-icon">📝</div></div><div class="kpi-value" style="color:#002664">${total}</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Passed</div><div class="kpi-icon">✅</div></div><div class="kpi-value" style="color:#002664">${passed}</div><div class="kpi-sub">${pct(passed,total)}% pass rate</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Failed</div><div class="kpi-icon">❌</div></div><div class="kpi-value" style="color:#002664">${total-passed}</div><div class="kpi-sub">${pct(total-passed,total)}% fail rate</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Avg Score</div><div class="kpi-icon">📊</div></div><div class="kpi-value" style="color:#002664">${avgSc}</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">First Pass Rate</div><div class="kpi-icon">🎯</div></div><div class="kpi-value" style="color:#002664">${fpr}%</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Retakers</div><div class="kpi-icon">🔄</div></div><div class="kpi-value" style="color:#002664">${retakers.size}</div><div class="kpi-sub">${retakerImproved} improved</div></div>
  `;
  d.appendChild(kpis);

  const scorePanel=document.createElement("div");scorePanel.className="panel";
  scorePanel.innerHTML=`<div class="panel-title">Score Distribution</div>${
    buckets.filter(b=>b.count>0||(b.score>=13&&b.score<=20)).map(b=>`
      <div class="score-bar-row">
        <span class="score-label">${b.score}</span>
        <div class="score-bar"><div class="fill" style="width:${(b.count/maxB)*100}%;background:${b.pass?"#002664":"#b91c1c"}">${b.count>0?`<span>${b.count}</span>`:""}</div></div>
        <span style="font-size:10px;color:${b.pass?"#002664":"#b91c1c"};width:30px">${b.pass?"Pass":"Fail"}</span>
      </div>`).join("")
  }<div style="display:flex;gap:16px;margin-top:10px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#002664;border-radius:2px;display:inline-block"></span>Passing (≥16)</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#b91c1c;border-radius:2px;display:inline-block"></span>Failing (&lt;16)</span></div>`;
  d.appendChild(scorePanel);

  const regPanel=document.createElement("div");regPanel.className="panel";
  regPanel.innerHTML=`<div class="panel-title">Pass Rate by Region</div><table class="tbl"><thead><tr><th>Region</th><th class="center">Took Exam</th><th class="center">Passed</th><th>Pass Rate</th></tr></thead><tbody>${
    regionRows.map((r,i)=>`<tr style="background:${i%2?"#f9fafb":"#fff"}"><td style="font-weight:600">${r.r}</td><td class="center">${r.t}</td><td class="center" style="color:#065f46;font-weight:600">${r.p}</td><td><div class="pbar-wrap"><div class="pbar"><div class="fill" style="width:${pct(r.p,r.t)}%;background:#002664"></div></div><span class="pbar-label">${pct(r.p,r.t)}%</span></div></td></tr>`).join("")
  }</tbody></table>`;
  d.appendChild(regPanel);

  if(qStats.length){
    const qPanel=document.createElement("div");qPanel.className="panel";
    qPanel.innerHTML=`<div class="panel-title">Questions Answered Incorrectly Most Often</div>${
      qStats.slice(0,10).map(q=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="width:80px;font-weight:600;color:#374151;flex-shrink:0">${q.col}</div>
        <div class="pbar" style="flex:1"><div class="fill" style="width:${q.pw}%;background:${q.pw>50?"#b91c1c":ORANGE}"></div></div>
        <div style="font-size:11px;color:${q.pw>50?"#b91c1c":ORANGE};width:50px;text-align:right;font-weight:600">${q.pw}% wrong</div>
        <div style="font-size:10px;color:#9ca3af;width:44px;text-align:right">${q.wrong}/${q.t}</div>
      </div>`).join("")
    }`;
    d.appendChild(qPanel);
  }
  return d;
}

function exportToExcel(filename, sheets){

}

const PASSCODE = "lean";
const PROTECTED_VIEWS = ["add-workshop","add-learners","add-trainer","add-project","upload"];
let passcodeUnlocked = false;
let pendingNav = null;

function requirePasscode(targetNav, onSuccess){
  if(passcodeUnlocked){ onSuccess(); return; }
  pendingNav = onSuccess;
  const modal = document.getElementById("passcode-modal");
  const input = document.getElementById("pc-input");
  const errEl = document.getElementById("pc-error");
  input.value = "";
  errEl.textContent = "";
  input.classList.remove("error");
  modal.classList.add("open");
  setTimeout(()=>input.focus(), 50);
}

function initPasscode(){
  const modal = document.getElementById("passcode-modal");
  const input = document.getElementById("pc-input");
  const errEl = document.getElementById("pc-error");

  function tryUnlock(){
    if(input.value === PASSCODE){
      passcodeUnlocked = true;
      modal.classList.remove("open");
      errEl.textContent = "";
      input.classList.remove("error");
      if(pendingNav){ pendingNav(); pendingNav = null; }
    } else {
      input.classList.add("error");
      errEl.textContent = "Incorrect passcode — try again.";
      input.value = "";
      setTimeout(()=>input.classList.remove("error"), 400);
    }
  }

  document.getElementById("pc-submit").onclick = tryUnlock;
  document.getElementById("pc-cancel").onclick = ()=>{
    modal.classList.remove("open");
    pendingNav = null;
  };
  input.addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });
  // Close on backdrop click
  modal.addEventListener("click", e=>{ if(e.target===modal){ modal.classList.remove("open"); pendingNav=null; }});
}

  const inactiveSites=[...allSites].filter(s=>!activeSiteData[s]).sort();

  const d=document.createElement("div");
  d.innerHTML=`<div class="page-title" style="margin-bottom:16px">Site Coverage</div>`;
  d.appendChild(buildFilterBar());
  d.appendChild(buildDateRange());

  // Summary KPIs
  const kpis=document.createElement("div");
  kpis.className="kpi-grid";kpis.style.marginBottom="20px";
  kpis.innerHTML=`
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Active Sites</div><div class="kpi-icon">✅</div></div><div class="kpi-value" style="color:#002664">${activeSites.length}</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">No Training Yet</div><div class="kpi-icon">⚠️</div></div><div class="kpi-value" style="color:#b91c1c">${inactiveSites.length}</div><div class="kpi-sub">${allSites.size} total sites known</div></div>
    <div class="kpi-card" style="border-top-color:#E18635"><div class="kpi-header"><div class="kpi-label">Coverage</div><div class="kpi-icon">📊</div></div><div class="kpi-value" style="color:#002664">${allSites.size?Math.round((activeSites.length/allSites.size)*100):0}%</div></div>
  `;
  d.appendChild(kpis);

  // Active sites table
  const activePanel=document.createElement("div");activePanel.className="panel";
  activePanel.innerHTML=`<div class="panel-title">Active Sites (${activeSites.length})</div>
    <table class="tbl"><thead><tr>
      <th>Site</th><th>Customer</th><th>Region</th><th class="center">Workshops</th><th class="center">Learners</th><th>Tiers Delivered</th><th>Last Workshop</th>
    </tr></thead><tbody>${
    activeSites.map((s,i)=>`<tr style="background:${i%2?"#f9fafb":"#fff"}">
      <td style="font-weight:600">${s.site}</td>
      <td>${s.customer||"—"}</td>
      <td>${s.region||"—"}</td>
      <td class="center" style="font-weight:600;color:#002664">${s.workshops}</td>
      <td class="center" style="font-weight:600;color:#002664">${s.learners}</td>
      <td>${s.tiers.map(t=>`<span class="badge" style="background:${TIER_BG[t]};color:${TIER_COLOR[t]};margin-right:3px">${t}</span>`).join("")}</td>
      <td style="color:#6b7280;font-size:12px">${s.latestDate||"—"}</td>
    </tr>`).join("")
  }</tbody></table>`;
  d.appendChild(activePanel);

  // Inactive sites
  if(inactiveSites.length){
    const inactPanel=document.createElement("div");inactPanel.className="panel";
    inactPanel.innerHTML=`<div class="panel-title" style="color:#b91c1c">Sites With No Training Activity (${inactiveSites.length})</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">These sites appear in your attendee or workshop data but have no workshops in the current filter.</div>
      ${inactiveSites.map(s=>`<div class="inactive-site"><span style="font-weight:500">${s}</span><span style="font-size:11px;color:#9ca3af">No workshops recorded</span></div>`).join("")}`;
    d.appendChild(inactPanel);
  }
  return d;
}

function viewVelocity(){
  const fd=getFilteredData();

  // Group workshops by month
  const monthMap={};
  fd.workshops.forEach(w=>{
    const mk=getMonthKey(w.date);
    if(!mk)return;
    if(!monthMap[mk])monthMap[mk]={month:mk,workshops:0,learners:new Set(),byTier:{}};
    monthMap[mk].workshops++;
    TIERS.forEach(t=>{if(!monthMap[mk].byTier[t])monthMap[mk].byTier[t]=0;});
    if(w.tier)monthMap[mk].byTier[w.tier]=(monthMap[mk].byTier[w.tier]||0)+1;
  });
  fd.attendees.forEach(a=>{
    const ws=fd.workshops.find(w=>w.id===a.workshopId);
    const mk=ws?getMonthKey(ws.date):null;
    if(mk&&monthMap[mk])monthMap[mk].learners.add(a.email);
  });

  const months=Object.values(monthMap).map(m=>({...m,learners:m.learners.size})).sort((a,b)=>a.month.localeCompare(b.month));
  const maxWs=Math.max(...months.map(m=>m.workshops),1);
  const maxL=Math.max(...months.map(m=>m.learners),1);

  // Time to train / certify stats
  const d2=data||SAMPLE;
  const tttStats=[];
  const ttcStats=[];
  TIERS.forEach(tier=>{
    const attMap={};
    fd.attendees.forEach(a=>{
      const ws=fd.workshops.find(w=>w.id===a.workshopId&&w.tier===tier);
      if(ws&&(!attMap[a.email]||ws.date<attMap[a.email]))attMap[a.email]=ws.date;
    });
    fd.exams.filter(x=>x.tier===tier&&x.passed).forEach(x=>{
      const wsDate=attMap[x.email];
      const days=daysBetween(wsDate,x.date);
      if(days!==null&&days>=0)tttStats.push({tier,days});
    });
    fd.exams.filter(x=>x.tier===tier&&x.passed).forEach(x=>{
      const proj=fd.projects.find(p=>p.email===x.email&&p.tier===tier&&isApproved(p));
      if(proj){const days=daysBetween(x.date,proj.submitted);if(days!==null&&days>=0)ttcStats.push({tier,days});}
    });
  });

  const avgTTT=tier=>{ const v=tttStats.filter(x=>!tier||x.tier===tier).map(x=>x.days); return v.length?Math.round(v.reduce((s,x)=>s+x,0)/v.length):null; };
  const avgTTC=tier=>{ const v=ttcStats.filter(x=>!tier||x.tier===tier).map(x=>x.days); return v.length?Math.round(v.reduce((s,x)=>s+x,0)/v.length):null; };

  // Retake rate by trainer
  const trainerRetake={};
  fd.workshops.forEach(w=>{
    if(!w.leadTrainer)return;
    const wsEmails=new Set(fd.attendees.filter(a=>a.workshopId===w.id).map(a=>a.email));
    const allRows=(d2.allExamRows||[]).filter(r=>wsEmails.has(r.email)&&r.tier===w.tier);
    const attemptMap={};
    allRows.forEach(r=>{const k=r.email;attemptMap[k]=(attemptMap[k]||0)+1;});
    const retakers=Object.values(attemptMap).filter(c=>c>1).length;
    const total=Object.keys(attemptMap).length;
    if(!trainerRetake[w.leadTrainer])trainerRetake[w.leadTrainer]={name:w.leadTrainer,total:0,retakers:0};
    trainerRetake[w.leadTrainer].total+=total;
    trainerRetake[w.leadTrainer].retakers+=retakers;
  });
  const trainerRetakeRows=Object.values(trainerRetake).filter(t=>t.total>0).map(t=>({...t,rate:Math.round((t.retakers/t.total)*100)})).sort((a,b)=>a.rate-b.rate);

  // Co-trainer stats
  const coTrainerStats={};
  fd.workshops.forEach(w=>{
    if(!w.coTrainer)return;
    if(!coTrainerStats[w.coTrainer])coTrainerStats[w.coTrainer]={name:w.coTrainer,coSessions:0,learners:new Set()};
    coTrainerStats[w.coTrainer].coSessions++;
    fd.attendees.filter(a=>a.workshopId===w.id).forEach(a=>coTrainerStats[w.coTrainer].learners.add(a.email));
  });
  const coRows=Object.values(coTrainerStats).map(t=>({...t,learners:t.learners.size})).sort((a,b)=>b.coSessions-a.coSessions);

  const d=document.createElement("div");
  d.innerHTML=`<div class="page-title" style="margin-bottom:16px">Training Velocity</div>`;
  d.appendChild(buildFilterBar());
  d.appendChild(buildDateRange());

  // Velocity chart
  if(months.length){
    const velPanel=document.createElement("div");velPanel.className="panel";
    velPanel.innerHTML=`<div class="panel-header" style="margin-bottom:16px">
        <div class="panel-title">Workshops per Month</div>
      </div>
      ${months.map(m=>`
      <div class="vel-bar-row">
        <span class="vb-label">${fmtMonth(m.month)}</span>
        <div class="vb-bar"><div class="fill" style="width:${Math.round((m.workshops/maxWs)*100)}%;background:#002664">
          ${m.workshops>0?`<span>${m.workshops}</span>`:""}
        </div></div>
        <span class="vb-count">${m.learners}👥</span>
      </div>`).join("")}
      <div style="display:flex;gap:10px;margin-top:8px">
        ${TIERS.map(t=>{
          const tot=months.reduce((s,m)=>s+(m.byTier[t]||0),0);
          return tot>0?`<span class="badge" style="background:${TIER_BG[t]};color:${TIER_COLOR[t]}">${t}: ${tot}</span>`:""
        }).join("")}
      </div>`;
    d.appendChild(velPanel);
  }

  // Time to train / certify
  const timePanel=document.createElement("div");timePanel.className="panel";
  timePanel.innerHTML=`<div class="panel-title">Average Time to Train &amp; Certify</div>
    <table class="tbl"><thead><tr>
      <th>Tier</th><th>Avg Days: Workshop → Exam Pass</th><th>Avg Days: Exam Pass → Project Approved</th>
    </tr></thead><tbody>${
    TIERS.map((tier,i)=>{
      const ttt=avgTTT(tier);const ttc=avgTTC(tier);const c=TIER_COLOR[tier]||NAVY;
      return`<tr style="background:${i%2?"#f9fafb":"#fff"}">
        <td style="font-weight:700;color:${c}">${tier}</td>
        <td style="font-weight:600">${ttt!==null?ttt+" days ("+fmtDays(ttt)+")":"Not enough data"}</td>
        <td style="font-weight:600;color:#00682A">${ttc!==null?ttc+" days ("+fmtDays(ttc)+")":"Not enough data"}</td>
      </tr>`;
    }).join("")
  }</tbody></table>
  <div style="margin-top:8px;font-size:11px;color:#9ca3af">Overall avg: Workshop→Pass ${fmtDays(avgTTT(null))} · Pass→Certified ${fmtDays(avgTTC(null))}</div>`;
  d.appendChild(timePanel);

  // Retake rate by trainer
  if(trainerRetakeRows.length){
    const retakePanel=document.createElement("div");retakePanel.className="panel";
    retakePanel.innerHTML=`<div class="panel-title">Exam Retake Rate by Trainer</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Lower retake rate = learners passing first time. Sorted best to worst.</div>
      <table class="tbl"><thead><tr><th>Trainer</th><th class="center">Learners with Exams</th><th class="center">Retakers</th><th>Retake Rate</th></tr></thead><tbody>${
      trainerRetakeRows.map((t,i)=>`<tr style="background:${i%2?"#f9fafb":"#fff"}">
        <td style="font-weight:600">${t.name}</td>
        <td class="center">${t.total}</td>
        <td class="center">${t.retakers}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div class="pbar" style="flex:1"><div class="fill" style="width:${t.rate}%;background:${t.rate>30?"#b91c1c":t.rate>15?"#f59e0b":"#00682A"}"></div></div>
          <span style="font-size:12px;font-weight:700;color:${t.rate>30?"#b91c1c":t.rate>15?"#f59e0b":"#00682A"};width:36px">${t.rate}%</span>
        </div></td>
      </tr>`).join("")
    }</tbody></table>`;
    d.appendChild(retakePanel);
  }

  // Co-trainer activity
  if(coRows.length){
    const coPanel=document.createElement("div");coPanel.className="panel";
    coPanel.innerHTML=`<div class="panel-title">Co-Trainer Activity</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Co-trainers developing toward lead qualification.</div>
      <table class="tbl"><thead><tr><th>Co-Trainer</th><th class="center">Sessions as Co-Trainer</th><th class="center">Learners Reached</th></tr></thead><tbody>${
      coRows.map((t,i)=>`<tr style="background:${i%2?"#f9fafb":"#fff"}">
        <td style="font-weight:600">${t.name}</td>
        <td class="center" style="font-weight:700;color:#002664">${t.coSessions}</td>
        <td class="center" style="font-weight:700;color:#1e40af">${t.learners}</td>
      </tr>`).join("")
    }</tbody></table>`;
    d.appendChild(coPanel);
  }

  return d;
}
